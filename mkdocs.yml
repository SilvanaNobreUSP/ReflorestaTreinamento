site_name: Treinamento SEMIL - ReflorestaSP
site_description: Material para treinamento interno SEMIL sobre a plataforma ReflorestaSP.
site_author: SEMIL

theme:
  name: material
  language: pt-BR
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/home-button.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Início: index.md
  - Aulas:
      - Aula 01 - Introdução à Plataforma Refloresta-SP: aula-01.md
      - Aula 02 - Conceito de Florestas Multifuncionais: aula-02.md
      - Aula 03 - Governança e Estrutura da Plataforma: aula-03.md
      - Aula 04 - Base de Dados e Critérios Técnicos: aula-04.md
      - Aula 05 - Modelagem por Faixas de Plantio: aula-05.md
      - Aula 06 - Seleção e Ranqueamento de Espécies: aula-06.md
      - Aula 07 - Simulação e Combinação de Espécies: aula-07.md
      - Aula 08 - Planejamento Produtivo e Financeiro: aula-08.md
      - Aula 09 - Funcionamento da Plataforma: aula-09.md
      - Aula 10 - Resultados e Contribuições: aula-10.md
      - Aula 11 - Outputs e Aplicação Prática: aula-11.md
